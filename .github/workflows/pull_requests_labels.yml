name: "Check Pull Request labels"

on:
  pull_request:
    types:
      - labeled
      - opened
      - synchronize
      - unlabeled
    branches:
      - main

permissions: {}

jobs:
  check_labels:
    name: "Check Pull Request labels"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check the labels
        uses: ludeeus/action-require-labels@be19cd7f04c6fad46a85336f9e9cebdf961807bb # 2.0.0
        with:
          labels: >-
              Breaking Change, Experimental, pr: new-feature,
              pr: enhancement, pr: refactor, pr: bugfix,
              pr: dependency-update, pr: action, pr: test,
              pr: repository